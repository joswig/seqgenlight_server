name: Test

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo (UI)
        uses: actions/checkout@v4
      - name: Setup Node (UI)
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - name: Install Dependencies
        run: npm ci
      - name: Run Tests
        run: |
          set -o pipefail
          npm test -- --coverage | tee coverage.log
      - name: Coverage Summary
        if: always()
        run: |
          {
            echo "## Coverage"
            echo '```'
            sed -n '/Coverage summary/,/^=\+$/p' coverage.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
