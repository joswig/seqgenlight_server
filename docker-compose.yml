version: '3.8'

services:
  seqgenlight-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: seqgenlight-server
    container_name: seqgenlight-server
    ports:
      - "5000:5000"
    environment:
      - HOST=0.0.0.0
      - PORT=5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
